<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U Filter</title>
</head>
<body>

<pre id="output"></pre>

<script>

document.addEventListener("DOMContentLoaded", function () {

  const API_URL = "http://alturl.com/p43ns";

  const UA_PREFIX = "#EXTVLCOPT:http-user-agent=";

  const LICENSE_KEY_PREFIX = "#KODIPROP:inputstream.adaptive.license_key=";
  const DRM_LEGACY_PREFIX =
    "#KODIPROP:inputstream.adaptive.drm_legacy=org.w3.clearkey|";

  const LICENSE_TYPE_CLEARKEY_LINE =
    "#KODIPROP:inputstream.adaptive.license_type=clearkey";

  const LICENSE_TYPE_ORG_W3_LINE =
    "#KODIPROP:inputstream.adaptive.license_type=org.w3.clearkey";

  function isUrlLine(line) {
    return /^https?:\/\//i.test(line.trim());
  }

  function isCommentedUrlLine(line) {
    return /^#{1,2}http/i.test(line.trim());
  }

  function transformLine(line) {

    if (line.startsWith(UA_PREFIX)) {
      const v = line.substring(UA_PREFIX.length);
      return UA_PREFIX + v.replace(/ /g, "%20");
    }

    if (line.trim() === LICENSE_TYPE_ORG_W3_LINE) return null;

    if (line.trim() === LICENSE_TYPE_CLEARKEY_LINE) return null;

    if (line.startsWith(LICENSE_KEY_PREFIX)) {
      const v = line.substring(LICENSE_KEY_PREFIX.length);
      return DRM_LEGACY_PREFIX + v;
    }

    return line;
  }

  const xhr = new XMLHttpRequest();

  xhr.open("GET", API_URL, true);

  xhr.onreadystatechange = function () {

    if (xhr.readyState === 4 && xhr.status === 200) {

      const data = xhr.responseText;

      const rawLines = data.split(/\r?\n/);

      const filteredLines = rawLines.filter(line =>
        /^#|^http/i.test(line.trim())
      );

      const lines = [];

      for (const ln of filteredLines) {
        const t = transformLine(ln);
        if (t !== null) lines.push(t);
      }

      const finalLines = [];

      let urlCount = 0;

      for (let i = 0; i < lines.length; i++) {

        const line = lines[i];

        if (isUrlLine(line)) {

          if (urlCount === 0) {
            finalLines.push(line);
          }

          urlCount++;

        } else {

          if (urlCount > 0) {
            finalLines.push("");
            urlCount = 0;
          }

          if (!isCommentedUrlLine(line)) {
            finalLines.push(line);
          }

        }

      }

      if (!finalLines[0] || finalLines[0].trim() !== "#EXTM3U") {
        finalLines.unshift("#EXTM3U");
      }

      const resultText = finalLines.join("\n");

      document.getElementById("output").textContent = resultText;

    }

  };

  xhr.send();

});

</script>

</body>
</html>
